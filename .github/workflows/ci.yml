# CI pipeline for IntentSight — runs on every PR and push to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check . --exit-non-zero-on-fix
          ruff format . --check

      - name: Type check with mypy
        run: |
          mypy --ignore-missing-imports app/ tests/ logging_config.py feature_store.py performance_tracker.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=300 2>&1 | tail -40