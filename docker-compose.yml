version: "3.9"

services:
  # -------------------------------------------------------------------------
  # Tier 2 — FastAPI REST API
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intentsight-api
    ports:
      - "8000:8000"
    volumes:
      - ./ML_Results:/app/ML_Results:ro
      - ./Preprocessed_Data_V2:/app/Preprocessed_Data_V2:ro
      - ./Behaviour_Dataset.csv:/app/Behaviour_Dataset.csv:ro
      - ./Behaviour_Extended_Dataset.csv:/app/Behaviour_Extended_Dataset.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Tier 1 — Streamlit Dashboard
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: intentsight-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./ML_Results:/app/ML_Results:ro
      - ./Preprocessed_Data_V2:/app/Preprocessed_Data_V2:ro
      - ./Behaviour_Dataset.csv:/app/Behaviour_Dataset.csv:ro
      - ./Behaviour_Extended_Dataset.csv:/app/Behaviour_Extended_Dataset.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
